# =============================================================================
# SIGAI-SES - Docker Compose
# =============================================================================
# Levantar servicios:
#   Produccion:    docker-compose up -d
#   Desarrollo:    docker-compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
# Ver logs:
#   docker-compose logs -f backend
#
# Detener:
#   docker-compose down
#
# Detener y eliminar datos:
#   docker-compose down -v
# =============================================================================

version: '3.8'

services:
  # --- BASE DE DATOS MARIADB ---
  # Almacena todos los datos de la aplicacion.
  # Los datos persisten en el volumen 'db_data'.
  db:
    image: mariadb:10.4
    container_name: sigai-db
    restart: unless-stopped
    environment:
      # Password del root de MySQL (CAMBIAR EN PRODUCCION)
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      # Nombre de la base de datos a crear
      MYSQL_DATABASE: ${DB_NAME:-sigai_ses}
      # Usuario y password para la aplicacion (CAMBIAR EN PRODUCCION)
      MYSQL_USER: ${DB_USER:-sigai}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sigai_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigai-network

  # --- BACKEND API (FastAPI) ---
  # Ejecuta el API de Python. Las tablas se crean automaticamente al iniciar.
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: sigai-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # URL de conexion a la BD (no cambiar el formato, solo los valores)
      DATABASE_URL: mysql+aiomysql://${DB_USER:-sigai}:${DB_PASSWORD:-sigai_password}@db:3306/${DB_NAME:-sigai_ses}
      # Clave secreta para tokens JWT (CAMBIAR EN PRODUCCION)
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      # Dominios permitidos (separados por coma)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      # Credenciales del admin (se crea en la primera ejecucion)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@securitas.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador SIGAI}
    ports:
      - "8000:8000"
    volumes:
      - static_files:/app/app/static
    networks:
      - sigai-network

  # --- FRONTEND (React) ---
  # Sirve la interfaz web del usuario.
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: sigai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sigai-network

  # --- NGINX (Reverse Proxy) ---
  # Punto de entrada unico. Redirige / al frontend y /api/ al backend.
  nginx:
    image: nginx:alpine
    container_name: sigai-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sigai-network

# --- VOLUMENES ---
# Persisten los datos entre reinicios del contenedor.
volumes:
  db_data:
  static_files:

# --- RED ---
# Comunicacion interna entre servicios.
networks:
  sigai-network:
    driver: bridge
